<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1200" viewBox="0 0 600 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#221f1b"/>
      <stop offset="0.5" stop-color="#161310"/>
      <stop offset="1" stop-color="#2a2621"/>
    </linearGradient>
    <filter id="vd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.007 0.02" numOctaves="6" seed="4" result="t"/>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.68 0 0 0 0 0.64 0 0 0 0 0.55 0 0 0 8 -3.6" result="m"/>
      <feGaussianBlur in="m" stdDeviation="0.5"/>
    </filter>
    <linearGradient id="sd" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1200" fill="url(#bd)"/>
  <rect width="600" height="1200" filter="url(#vd)" opacity="0.45"/>
  <rect width="600" height="1200" fill="url(#sd)"/>
</svg>
