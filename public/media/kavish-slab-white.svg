<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1200" viewBox="0 0 600 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ec"/>
      <stop offset="0.5" stop-color="#e9e2d5"/>
      <stop offset="1" stop-color="#f2ebdf"/>
    </linearGradient>
    <filter id="v" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.008 0.021" numOctaves="6" seed="9" result="t"/>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.40 0 0 0 0 0.38 0 0 0 0 0.34 0 0 0 9 -4" result="m"/>
      <feGaussianBlur in="m" stdDeviation="0.5"/>
    </filter>
    <filter id="v2">
      <feTurbulence type="fractalNoise" baseFrequency="0.016 0.04" numOctaves="4" seed="21" result="t2"/>
      <feColorMatrix in="t2" type="matrix" values="0 0 0 0 0.72 0 0 0 0 0.68 0 0 0 0 0.6 0 0 0 5 -2.6"/>
    </filter>
    <linearGradient id="s" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.14"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1200" fill="url(#b)"/>
  <rect width="600" height="1200" filter="url(#v)" opacity="0.55"/>
  <rect width="600" height="1200" filter="url(#v2)" opacity="0.32"/>
  <rect width="600" height="1200" fill="url(#s)"/>
</svg>
