<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7ddc9"/>
      <stop offset="0.5" stop-color="#d6c9ae"/>
      <stop offset="1" stop-color="#e3d7bf"/>
    </linearGradient>
    <filter id="vb" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="5" seed="14" result="t"/>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.55 0 0 0 0 0.5 0 0 0 0 0.42 0 0 0 4 -1.8" result="m"/>
      <feGaussianBlur in="m" stdDeviation="0.6"/>
    </filter>
    <linearGradient id="sb" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.16"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bb)"/>
  <rect width="800" height="800" filter="url(#vb)" opacity="0.4"/>
  <rect width="800" height="800" fill="url(#sb)"/>
</svg>
